name: Verify Release Attestations

# ─────────────────────────────────────────────────────────────────────────────
# On-demand workflow to verify all attestations for a given release.
#
# Use this to independently confirm that a release image's attestations are
# intact and verifiable against Sigstore's public transparency log.
#
# Checks all four predicate types produced by the release process:
#   1. SLSA Build Provenance  (from RC)
#   2. Test Results            (from RC)
#   3. Release PR CI Summary   (from RC)
#   4. Release Promotion       (from release)
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to verify (e.g. v0.2.1)'
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  verify:
    name: Verify attestations for ${{ inputs.release_tag }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      IMAGE_NAME: ghcr.io/${{ github.repository }}/poc

    steps:
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image digest
        id: resolve
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          DIGEST=$(crane digest "${{ env.IMAGE_NAME }}:${RELEASE_TAG}")
          if [ -z "$DIGEST" ]; then
            echo "::error::Could not resolve digest for ${{ env.IMAGE_NAME }}:${RELEASE_TAG}"
            exit 1
          fi
          ARTIFACT_REF="${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "artifact_ref=${ARTIFACT_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${RELEASE_TAG} → ${DIGEST}"

      - name: Verify build provenance (SLSA)
        id: verify_build
        run: |
          if gh attestation verify \
            "oci://${{ steps.resolve.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://slsa.dev/provenance/v1"; then
            echo "status=✅ PASSED" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌ FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::Build provenance verification failed"
          fi

      - name: Verify test-results
        id: verify_tests
        run: |
          if gh attestation verify \
            "oci://${{ steps.resolve.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://example.com/test-results/v1"; then
            echo "status=✅ PASSED" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌ FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::Test-results verification failed"
          fi

      - name: Verify release-PR CI summary
        id: verify_summary
        run: |
          if gh attestation verify \
            "oci://${{ steps.resolve.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://example.com/release-pr-ci-summary/v1"; then
            echo "status=✅ PASSED" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌ FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::Release-PR CI summary verification failed"
          fi

      - name: Verify release-promotion
        id: verify_promotion
        run: |
          if gh attestation verify \
            "oci://${{ steps.resolve.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://example.com/release-promotion/v1"; then
            echo "status=✅ PASSED" >> "$GITHUB_OUTPUT"
          else
            echo "status=❌ FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::Release-promotion verification failed"
          fi

      - name: Summary
        run: |
          RELEASE_TAG="${{ inputs.release_tag }}"
          DIGEST="${{ steps.resolve.outputs.digest }}"
          ARTIFACT_REF="${{ steps.resolve.outputs.artifact_ref }}"

          echo "### 🔍 Attestation Verification – ${RELEASE_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`${RELEASE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${ARTIFACT_REF}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Attestation | Predicate Type | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|----------------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Provenance (SLSA) | \`https://slsa.dev/provenance/v1\` | ${{ steps.verify_build.outputs.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test Results | \`https://example.com/test-results/v1\` | ${{ steps.verify_tests.outputs.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release PR CI Summary | \`https://example.com/release-pr-ci-summary/v1\` | ${{ steps.verify_summary.outputs.status }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release Promotion | \`https://example.com/release-promotion/v1\` | ${{ steps.verify_promotion.outputs.status }} |" >> "$GITHUB_STEP_SUMMARY"
