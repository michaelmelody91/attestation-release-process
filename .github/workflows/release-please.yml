name: Release Please

# ─────────────────────────────────────────────────────────────────────────────
# This workflow has two responsibilities:
#
#   1. OPEN / UPDATE a Release Please PR whenever commits land on `main`.
#      Release Please inspects conventional commits and bumps the version in
#      .release-please-manifest.json, generating a CHANGELOG entry.
#
#   2. CUT A GITHUB RELEASE when the Release Please PR is merged.
#      Immediately after, the `release_evidence` job runs to:
#        - Look up the RC image digest from the merged Release Please PR
#        - Promote the RC image to the release tag by re-tagging (NOT
#          rebuilding), preserving the digest so all RC attestations (build
#          provenance, test results, PR CI summary) carry over automatically
#        - Create a signed "release-promotion" attestation recording the
#          promotion from RC to release
#        - Verify all four attestations (3 from RC + 1 promotion)
#        - Download attestation bundles
#        - Generate a compliance evidence markdown report
#        - Upload the report + attestation bundles to the GitHub Release
#
# NOTE: A Personal Access Token (PAT) is passed to Release Please via the
# RELEASE_PLEASE_TOKEN secret.  The default GITHUB_TOKEN would prevent
# workflows (e.g. rc-attest-on-release-please-pr.yml) from triggering on
# the Release Please PR.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Minimum permissions for the Release Please action.
# The release_evidence job overrides these with the additional scopes it needs.
permissions:
  contents: write
  pull-requests: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Job 1 – Run the Release Please action
  #
  # On every push to main:
  #   - If there are releasable commits, create or update the Release Please PR.
  #   - If the Release Please PR was just merged, create the GitHub Release and
  #     update the manifest version.
  #
  # Outputs consumed by the release_evidence job:
  #   release_created  – "true" when a GitHub Release was just cut
  #   tag_name         – e.g. "v0.2.0"
  # ───────────────────────────────────────────────────────────────────────────
  release_please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          # A PAT is required so that the Release Please PR triggers
          # downstream workflows (e.g. rc-attest-on-release-please-pr.yml).
          # The default GITHUB_TOKEN intentionally does not trigger further
          # workflow runs to prevent recursive loops.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Manifest mode: version is tracked in .release-please-manifest.json
          # and workflow options are read from .release-please-config.json.
          config-file:   .release-please-config.json
          manifest-file: .release-please-manifest.json

  # ───────────────────────────────────────────────────────────────────────────
  # Job 2 – Promote the RC image to a release and attach attestation evidence
  #
  # Only runs when Job 1 actually cut a new GitHub Release.
  #
  # Instead of rebuilding the image, this job PROMOTES the RC image (built
  # and attested during the Release Please PR lifecycle) to the release tag.
  # The digest is preserved, so all RC attestations (build provenance, test
  # results, PR CI summary) automatically apply to the release image.
  #
  # A new "release-promotion" attestation is created to record that the RC
  # was promoted by re-tagging (not rebuilding).
  #
  # Steps:
  #   1. Check out the release tag
  #   2. Log in to GHCR
  #   3. Find the RC image digest from the Release Please PR comment
  #   4. Re-tag the RC image with the release version (digest preserved)
  #   5. Create a release-promotion attestation             (actions/attest)
  #   6. Verify all 4 attestations (3 from RC + 1 promotion)
  #   7. Download attestation bundles
  #   8. Generate a compliance markdown report
  #   9. Upload report + bundles to the GitHub Release
  # ───────────────────────────────────────────────────────────────────────────
  release_evidence:
    name: Promote RC, attest & attach release evidence
    needs: release_please
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    # Additional scopes beyond the workflow defaults.
    permissions:
      contents: write     # upload assets to the GitHub Release
      packages: write     # push image + attestations to GHCR
      id-token: write     # obtain OIDC token for Sigstore signing
      attestations: write # persist attestations via the GitHub attestations API

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Canonical GHCR image path.  The /poc suffix names the image as a
      # dedicated sub-package within this repository's GHCR namespace.
      IMAGE_NAME: ghcr.io/${{ github.repository }}/poc

    steps:
      # ── Checkout the exact commit that Release Please just tagged ──────────
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release_please.outputs.tag_name }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Install crane for efficient image re-tagging ───────────────────────
      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      # ── Find the RC image digest from the merged Release Please PR ─────────
      # The RC workflow (rc-attest-on-release-please-pr.yml) posts a comment on
      # the Release Please PR containing the RC image digest.  We extract it
      # here so we can promote (re-tag) that exact image to the release tag.
      - name: Find RC digest from Release Please PR
        id: rc
        run: |
          # Find the PR that was merged for this push event
          PR_NUMBER=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].number')
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not find the merged Release Please PR for commit ${{ github.sha }}"
            exit 1
          fi
          echo "Found Release Please PR: #${PR_NUMBER}"

          # Extract the RC digest from the machine-readable HTML comment
          # posted by the verify_and_comment job in rc-attest-on-release-please-pr.yml.
          RC_DIGEST=$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json comments \
            --jq '[.comments[] | select(.body | contains("rc-digest:")) | .body] | last' \
            | grep -m1 -oP '(?<=rc-digest: )sha256:[a-f0-9]{64}')
          echo "digest=${RC_DIGEST}" >> "$GITHUB_OUTPUT"

          if [ -z "$RC_DIGEST" ]; then
            echo "::error::Could not find RC digest in PR #${PR_NUMBER} comments"
            exit 1
          fi
          echo "Found RC digest: ${RC_DIGEST}"

          # Derive the RC tag from the release tag (e.g. v1.2.0 → v1.2.0-rc)
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"
          RC_TAG="${RELEASE_TAG}-rc"
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"
          echo "RC tag: ${RC_TAG}"

      # ── Promote the RC image to the release tag ────────────────────────────
      # Re-tag the RC image with the release version.  This does NOT rebuild –
      # the digest is preserved so all RC attestations (build provenance, test
      # results, PR CI summary) automatically carry over to the release image.
      - name: Promote RC image to release tag
        id: promote
        run: |
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"
          RC_DIGEST="${{ steps.rc.outputs.digest }}"

          echo "Promoting RC image to release..."
          echo "  RC digest:    ${RC_DIGEST}"
          echo "  Release tag:  ${RELEASE_TAG}"

          # Add the release version tag to the existing RC image manifest.
          crane tag "${{ env.IMAGE_NAME }}@${RC_DIGEST}" "${RELEASE_TAG}"

          # Verify the digest is preserved after tagging.
          RELEASE_DIGEST=$(crane digest "${{ env.IMAGE_NAME }}:${RELEASE_TAG}")
          echo "  Release digest: ${RELEASE_DIGEST}"

          if [ "${RC_DIGEST}" != "${RELEASE_DIGEST}" ]; then
            echo "::error::Digest mismatch after promotion! RC=${RC_DIGEST}, Release=${RELEASE_DIGEST}"
            exit 1
          fi

          echo "✅ Release image has the same digest as the RC image"
          echo "artifact_ref=${{ env.IMAGE_NAME }}@${RC_DIGEST}" >> "$GITHUB_OUTPUT"

      # ── Attestation: Release Promotion ─────────────────────────────────────
      # Records the supply chain step of promoting the RC image to a release
      # by re-tagging.  Uses the in-toto Link predicate to capture the
      # materials (RC image) and the operation performed.  The digest is
      # identical, so all prior RC attestations remain valid for the release.
      - name: Generate release-promotion predicate
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"
          RC_TAG="${{ steps.rc.outputs.rc_tag }}"
          RC_DIGEST="${{ steps.rc.outputs.digest }}"
          RC_DIGEST_HEX="${RC_DIGEST#sha256:}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"
          cat > promotion-predicate.json << EOF
          {
            "name": "promote-rc-to-release",
            "command": ["crane", "tag", "${{ env.IMAGE_NAME }}@${RC_DIGEST}", "${RELEASE_TAG}"],
            "materials": [
              {
                "uri": "oci://${{ env.IMAGE_NAME }}:${RC_TAG}",
                "digest": { "sha256": "${RC_DIGEST_HEX}" }
              }
            ],
            "byproducts": {
              "releaseTag":      "${RELEASE_TAG}",
              "rcTag":           "${RC_TAG}",
              "sourcePR":        "${{ steps.rc.outputs.pr_number }}",
              "digestPreserved": true
            },
            "environment": {
              "workflowRun": "${RUN_URL}",
              "repository":  "${REPO}",
              "timestamp":   "${TIMESTAMP}"
            }
          }
          EOF

      - name: Attest release promotion
        id: attest_promotion
        uses: actions/attest@v2
        with:
          subject-name:     ${{ env.IMAGE_NAME }}
          subject-digest:   ${{ steps.rc.outputs.digest }}
          predicate-type:   "https://in-toto.io/attestation/link/v0.3"
          predicate-path:   promotion-predicate.json
          push-to-registry: true

      # ── Verify all attestations ────────────────────────────────────────────
      # Because the release image has the same digest as the RC, the three
      # attestations created during the Release Please PR lifecycle (build
      # provenance, test results, PR CI summary) are verifiable on the release
      # image without any additional work.  The fourth attestation (release
      # promotion) was just created above.
      - name: Verify build provenance attestation (from RC)
        id: verify_build
        run: |
          gh attestation verify \
            "oci://${{ steps.promote.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://slsa.dev/provenance/v1"
          echo "status=PASSED" >> "$GITHUB_OUTPUT"

      - name: Verify test-results attestation (from RC)
        id: verify_tests
        run: |
          gh attestation verify \
            "oci://${{ steps.promote.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://in-toto.io/attestation/test-result/v0.1"
          echo "status=PASSED" >> "$GITHUB_OUTPUT"

      - name: Verify release-PR CI summary attestation (from RC)
        id: verify_summary
        run: |
          gh attestation verify \
            "oci://${{ steps.promote.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://in-toto.io/attestation/scai/attribute-report/v0.2"
          echo "status=PASSED" >> "$GITHUB_OUTPUT"

      - name: Verify release-promotion attestation
        id: verify_promotion
        run: |
          gh attestation verify \
            "oci://${{ steps.promote.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}" \
            --predicate-type "https://in-toto.io/attestation/link/v0.3"
          echo "status=PASSED" >> "$GITHUB_OUTPUT"

      # ── Download attestation bundles ───────────────────────────────────────
      - name: Download attestation bundles
        run: |
          mkdir -p attestation-bundles
          cd attestation-bundles
          gh attestation download \
            "oci://${{ steps.promote.outputs.artifact_ref }}" \
            --owner "${{ github.repository_owner }}"
          echo "Downloaded attestation files:"
          ls -lh

      # ── Generate the compliance evidence report ────────────────────────────
      - name: Generate compliance evidence report
        run: |
          DIGEST="${{ steps.rc.outputs.digest }}"
          DIGEST_SHORT="${DIGEST#sha256:}"
          DIGEST_SHORT="${DIGEST_SHORT:0:12}"
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          OWNER="${{ github.repository_owner }}"
          PR_NUMBER="${{ steps.rc.outputs.pr_number }}"

          REPORT_FILE="compliance-evidence-${DIGEST_SHORT}.md"

          cat > "${REPORT_FILE}" << REPORT
          # Compliance Evidence Report

          | Field | Value |
          |-------|-------|
          | Release | \`${RELEASE_TAG}\` |
          | Generated | \`${TIMESTAMP}\` |
          | Repository | \`${REPO}\` |
          | Run ID | \`${{ github.run_id }}\` |
          | Source PR | #${PR_NUMBER} |

          ## Image Reference

          \`\`\`
          ${{ env.IMAGE_NAME }}@${DIGEST}
          \`\`\`

          > **Digest preserved:** The release image is the RC image promoted by
          > re-tagging (no rebuild).  The digest is identical, so all RC
          > attestations carry over to the release image.

          ## Attestation Verification Results

          | Attestation | Predicate Type | Origin | Status |
          |-------------|----------------|--------|--------|
          | Build Provenance (SLSA) | \`https://slsa.dev/provenance/v1\` | RC | ✅ ${{ steps.verify_build.outputs.status }} |
          | Test Results | \`https://in-toto.io/attestation/test-result/v0.1\` | RC | ✅ ${{ steps.verify_tests.outputs.status }} |
          | Release PR CI Summary | \`https://in-toto.io/attestation/scai/attribute-report/v0.2\` | RC | ✅ ${{ steps.verify_summary.outputs.status }} |
          | Release Promotion | \`https://in-toto.io/attestation/link/v0.3\` | Release | ✅ ${{ steps.verify_promotion.outputs.status }} |

          ## Attestation Bundles

          The \`.jsonl\` files attached to this release contain the signed in-toto
          attestation envelopes. Verify independently with:

          \`\`\`bash
          gh attestation verify \\
            oci://${{ env.IMAGE_NAME }}@${DIGEST} \\
            --owner ${OWNER}
          \`\`\`
          REPORT

          echo "REPORT_FILE=${REPORT_FILE}" >> "$GITHUB_ENV"

      # ── Upload report and bundles to the GitHub Release ────────────────────
      - name: Upload evidence to GitHub Release
        run: |
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"

          gh release upload "${RELEASE_TAG}" "${REPORT_FILE}" --clobber

          for bundle_file in attestation-bundles/*; do
            [ -f "${bundle_file}" ] && \
              gh release upload "${RELEASE_TAG}" "${bundle_file}" --clobber
          done

      - name: Step summary
        run: |
          DIGEST="${{ steps.rc.outputs.digest }}"
          RELEASE_TAG="${{ needs.release_please.outputs.tag_name }}"
          RC_TAG="${{ steps.rc.outputs.rc_tag }}"
          echo "### 🚀 Release evidence attached" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`${RELEASE_TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest  | \`${DIGEST}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Promotion | \`${RC_TAG}\` → \`${RELEASE_TAG}\` (re-tag, same digest) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Attestations (all verified ✅)" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Build Provenance (SLSA) – from RC" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Test Results – from RC" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Release PR CI Summary – from RC" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Release Promotion – new" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Evidence report and attestation bundles uploaded to the GitHub Release." \
            >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────────
  # Job 3 – Post-release Deployment
  #
  # Runs after the release evidence job completes successfully.
  # This represents the actual deployment of the released artifact.
  #
  # For this POC the deployment step is a simple echo command.  Replace it
  # with real deployment logic (e.g. kubectl set image, helm upgrade,
  # ArgoCD app sync, AWS CDK deploy, Terraform apply, etc.).
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy release
    needs: [release_please, release_evidence]
    if: needs.release_please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy
        run: |
          TAG="${{ needs.release_please.outputs.tag_name }}"
          IMAGE="ghcr.io/${{ github.repository }}/poc:${TAG}"
          echo "🚀 Deploying release ${TAG}"
          echo "Image: ${IMAGE}"
          echo ""
          echo "This is a POC deployment step."
          echo "Replace this echo with real deployment logic, for example:"
          echo "  kubectl set image deployment/my-app my-app=${IMAGE}"

      - name: Step summary
        run: |
          TAG="${{ needs.release_please.outputs.tag_name }}"
          echo "### 🚀 Deployment completed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`ghcr.io/${{ github.repository }}/poc:${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Note:** Replace the deploy step with real deployment logic." \
            >> "$GITHUB_STEP_SUMMARY"
